<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🧠 Профилактика радикализации · 9 часов · Слайды</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      max-width: 1300px;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* header */
    .header {
      background: #0b2b4a;
      color: white;
      padding: 20px 28px;
    }
    .header h1 {
      font-weight: 500;
      font-size: 1.9rem;
      letter-spacing: -0.01em;
    }
    .header p {
      opacity: 0.8;
      margin-top: 6px;
      font-size: 1rem;
    }

    /* main layout: sidebar + content */
    .main-panel {
      display: flex;
      flex: 1;
      min-height: 600px;
    }

    /* left navigation (modules) */
    .module-nav {
      width: 280px;
      background: #f8fafc;
      border-right: 1px solid #e2e8f0;
      padding: 24px 0;
      overflow-y: auto;
    }
    .module-nav h3 {
      padding: 0 20px 12px;
      font-weight: 600;
      color: #1e293b;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .module-list {
      list-style: none;
    }
    .module-item {
      padding: 14px 20px;
      margin: 4px 8px;
      border-radius: 16px;
      font-weight: 500;
      color: #334155;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .module-item .badge {
      background: #cbd5e1;
      color: #0f172a;
      border-radius: 40px;
      padding: 2px 10px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .module-item:hover {
      background: #e6edf5;
    }
    .module-item.active {
      background: #0b2b4a;
      color: white;
    }
    .module-item.active .badge {
      background: #3b82f6;
      color: white;
    }

    /* right content — slides area */
    .slides-area {
      flex: 1;
      padding: 28px 32px;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .module-title {
      font-size: 2rem;
      font-weight: 600;
      color: #0b2b4a;
      margin-bottom: 8px;
    }
    .module-meta {
      display: flex;
      gap: 20px;
      color: #64748b;
      margin-bottom: 28px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 16px;
    }

    /* slide container */
    .slide-container {
      flex: 1;
      background: #f9f9fc;
      border-radius: 24px;
      padding: 24px 30px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 6px 12px -6px rgba(0,0,0,0.1);
      border: 1px solid #eef2f6;
      margin-bottom: 20px;
    }

    .slide-content {
      min-height: 300px;
    }

    .slide-content h2 {
      font-size: 1.8rem;
      color: #0b2b4a;
      margin-bottom: 20px;
      border-left: 6px solid #2563eb;
      padding-left: 20px;
    }
    .slide-content h3 {
      font-size: 1.3rem;
      margin: 20px 0 10px;
      color: #1e293b;
    }
    .slide-content ul, .slide-content ol {
      padding-left: 28px;
      margin: 15px 0;
      line-height: 1.6;
    }
    .slide-content li {
      margin-bottom: 8px;
    }
    .slide-content p {
      line-height: 1.6;
      margin-bottom: 16px;
      color: #334155;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin: 20px 0;
    }
    .info-card {
      background: white;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      border: 1px solid #e9edf2;
    }
    .info-card strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: #0b2b4a;
    }
    .highlight {
      background: #e6f0ff;
      padding: 16px 20px;
      border-radius: 20px;
      margin: 20px 0;
      border-left: 4px solid #2563eb;
    }

    /* pagination controls */
    .slide-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }
    .nav-buttons {
      display: flex;
      gap: 12px;
    }
    .nav-btn {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 40px;
      padding: 8px 20px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.1s;
      color: #1e293b;
    }
    .nav-btn:hover {
      background: #0b2b4a;
      color: white;
      border-color: #0b2b4a;
    }
    .nav-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .slide-indicator {
      font-weight: 500;
      color: #475569;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: right;
    }

    /* responsive */
    @media (max-width: 700px) {
      .main-panel {
        flex-direction: column;
      }
      .module-nav {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e2e8f0;
        padding: 12px 0;
      }
      .module-list {
        display: flex;
        flex-wrap: wrap;
        padding: 0 8px;
      }
      .module-item {
        flex: 1 0 auto;
        margin: 4px;
      }
      .slides-area {
        padding: 20px 16px;
      }
      .module-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

</div>

         <p>Использовать полный комплект материалов программы для подростков.</p>
         <p>При трудностях — супервизия, обращение к методистам.</p>`,
        
        `<h2>✨ Спасибо за работу!</h2>
         <p>Вы готовы проводить индивидуальную профилактику радикализации.</p>
         <p><strong>Детский телефон доверия: 8-800-2000-122</strong></p>`
      ]
    };

    // ---------- СОСТОЯНИЕ ----------
    let currentModuleId = 'm1';
    let currentSlideIndex = 0;

    // DOM элементы
    const moduleListEl = document.getElementById('moduleList');
    const moduleTitleEl = document.getElementById('moduleTitle');
    const moduleMetaEl = document.getElementById('moduleMeta');
    const slideContentEl = document.getElementById('slideContent');
    const slideIndicator = document.getElementById('slideIndicator');
    const prevBtn = document.getElementById('prevSlideBtn');
    const nextBtn = document.getElementById('nextSlideBtn');

    // Рендер списка модулей
    function renderModuleList() {
      moduleListEl.innerHTML = '';
      modules.forEach(mod => {
        const li = document.createElement('li');
        li.className = 'module-item' + (mod.id === currentModuleId ? ' active' : '');
        li.innerHTML = `<span>${mod.name}</span><span class="badge">${mod.duration}</span>`;
        li.addEventListener('click', () => {
          setActiveModule(mod.id);
        });
        moduleListEl.appendChild(li);
      });
    }

    // Установка активного модуля
    function setActiveModule(moduleId) {
      currentModuleId = moduleId;
      currentSlideIndex = 0;
      
      // Обновить активный класс в списке
      document.querySelectorAll('.module-item').forEach(el => {
        const spans = el.querySelectorAll('span');
        const moduleName = spans[0]?.innerText || '';
        const mod = modules.find(m => m.name === moduleName);
        if (mod && mod.id === moduleId) {
          el.classList.add('active');
        } else {
          el.classList.remove('active');
        }
      });
      
      const mod = modules.find(m => m.id === moduleId);
      moduleTitleEl.textContent = mod.name;
      moduleMetaEl.textContent = mod.meta;
      
      updateSlide();
    }

    // Обновление слайда
    function updateSlide() {
      const slides = slidesData[currentModuleId] || [];
      if (slides.length === 0) {
        slideContentEl.innerHTML = '<p>Слайды в разработке</p>';
        slideIndicator.textContent = `Слайд 0 / 0`;
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }
      
      slideContentEl.innerHTML = slides[currentSlideIndex];
      slideIndicator.textContent = `Слайд ${currentSlideIndex+1} / ${slides.length}`;
      
      prevBtn.disabled = (currentSlideIndex === 0);
      nextBtn.disabled = (currentSlideIndex === slides.length - 1);
    }

    // Обработчики кнопок
    prevBtn.addEventListener('click', () => {
      const slides = slidesData[currentModuleId];
      if (currentSlideIndex > 0) {
        currentSlideIndex--;
        updateSlide();
      }
    });
    
    nextBtn.addEventListener('click', () => {
      const slides = slidesData[currentModuleId];
      if (currentSlideIndex < slides.length - 1) {
        currentSlideIndex++;
        updateSlide();
      }
    });

    // Инициализация
    renderModuleList();
    // По умолчанию активен m1
    setActiveModule('m1');

    // Поддержка свайпов (очень просто)
    let touchStartX = 0;
    slideContentEl.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, {passive: true});
    slideContentEl.addEventListener('touchend', (e) => {
      if (!touchStartX) return;
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff < 0) {
          // свайп влево -> следующий
          const slides = slidesData[currentModuleId];
          if (currentSlideIndex < slides.length - 1) {
            currentSlideIndex++;
            updateSlide();
          }
        } else {
          // свайп вправо -> предыдущий
          if (currentSlideIndex > 0) {
            currentSlideIndex--;
            updateSlide();
          }
        }
      }
      touchStartX = 0;
    });

  })();
</script>
</body>
</html>
