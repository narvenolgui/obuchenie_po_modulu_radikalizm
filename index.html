<script>
  (function(){
    "use strict";

    const modules = [
      { id: 'm1', short: 'Занятие 1', name: 'Занятие 1 · Теория и структура', meta: '⏱️ 2 часа · Факторы риска, диагностика, контакт' },
      { id: 'm2', short: 'Занятие 2', name: 'Занятие 2 · Бинарное мышление и ценности', meta: '⏱️ 1.5 ч · Занятия 1–2 (Спектр, Кто я)' },
      { id: 'm3', short: 'Занятие 3', name: 'Занятие 3 · Эмпатия и потребности', meta: '⏱️ 1.5 ч · Занятия 3–4 (Другой, Пирамида)' },

      { id: 'm5', short: 'Занятие 5', name: 'Занятие 5 · Идентичность и будущее', meta: '⏱️ 1.5 ч · Занятия 7–9 (Ресурсы, Дилеммы, Карта)' },
      { id: 'm6', short: 'Занятие 6', name: 'Занятие 6 · Итоговая аттестация', meta: '⏱️ 1 час · Зачёт, демонстрация, сертификаты' }
    ];

    // Расширенные подробные слайды
    const slidesData = {
      m1: [ ... ], // (оставлены без изменений, т.к. уже подробны)
      m2: [
        `<h2>🎯 Бинарное мышление и ценности – цели занятий 1–2</h2>
         <p><strong>Почему это критически важно?</strong> Радикальные идеологии опираются на чёрно-белую картину мира: «мы – они», «свои – чужие». Подросток, не умеющий видеть оттенки, становится лёгкой добычей.</p>
         <p>🔹 <strong>Занятие 1 («Спектр»)</strong> разрушает бинарность.<br>🔹 <strong>Занятие 2 («Кто я?»)</strong> укрепляет многомерную идентичность и выявляет истинные ценности.</p>
         <div class="highlight-box">📌 Итог: подросток начинает видеть альтернативы и осознаёт, что он – не только «борец», но и сын, друг, спортсмен.</div>`,
         
        `<h2>🗺️ Упражнение «Карта спектра» – пошаговая методика</h2>
         <p><strong>Цель:</strong> показать, что между агрессией и бездействием существует множество конструктивных решений.</p>
         <h3>📋 Алгоритм проведения:</h3>
         <ol>
           <li><strong>Выбор ситуации:</strong> конфликтная, но не слишком личная (например, соседи и музыка).</li>
           <li><strong>Рисование линии:</strong> левый край – самое жёсткое, агрессивное; правый – полное избегание.</li>
           <li><strong>Генерация идей:</strong> подросток предлагает варианты, психолог записывает их на линии, не оценивая.</li>
           <li><strong>Рефлексия:</strong> вопросы «Какой вариант кажется тебе самым реальным?», «Почему в гневе мы не видим середину?».</li>
         </ol>
         <p>⏱️ Время: 15–20 минут.</p>`,
         
        `<h2>💬 «Карта спектра» – пример диалога с подростком</h2>
         <div class="highlight-box">
           <p><strong>Психолог:</strong> «Представь: соседка жалуется на музыку во дворе. Левый край – что можно сделать агрессивного?»<br>
           <strong>Подросток:</strong> «Ну, послать её, разбить колонку…»<br>
           <strong>Психолог:</strong> «А правый край – полное бездействие?»<br>
           <strong>Подросток:</strong> «Терпеть, больше не собираться».<br>
           <strong>Психолог:</strong> «А что между? Давай придумаем 10 вариантов, даже странных».</p>
         </div>
         <p>Важно: психолог <strong>не оценивает</strong> идеи, только записывает и стимулирует креативность.</p>`,
         
        `<h2>🔄 «Круги идентичности» – визуализация многогранности</h2>
         <p>В центре листа – «Я». Вокруг – круги разных размеров: сын, ученик, друг, спортсмен, музыкант, гражданин…</p>
         <p><strong>Вопросы:</strong> «Какой круг самый большой?», «Если один круг исчезнет, кто ты останешься?»</p>
         <p>🎯 <strong>Цель:</strong> показать, что отказ от радикальной роли не уничтожает личность.</p>`,
         
        `<h2>💎 «Магазин ценностей» – выявление истинных приоритетов</h2>
         <p>Набор из 20 карточек (семья, свобода, власть, справедливость…). Выбрать 5 → оставить 3 → выбрать 1.</p>
         <p><strong>Ключевой вопрос:</strong> «Можно ли достичь этой ценности через насилие?»</p>
         <p>Пример: если выбрана «справедливость», спросить: «Убивая невинных – это справедливость?».</p>
         <div class="highlight-box">❗ Если подросток выбирает «силу», уточнить: «Что значит сила? Кого ты считаешь по-настоящему сильным?»</div>`,
         
        `<h2>📝 Типичные трудности и решения (занятие 2)</h2>
         <ul>
           <li><strong>«Не знаю»:</strong> предложить пофантазировать («А если бы ты был режиссёром?») или дать один свой пример.</li>
           <li><strong>Выбирает только агрессивные варианты:</strong> спросить: «А какие варианты устроили бы обе стороны?»</li>
           <li><strong>Обесценивание:</strong> «Это всё фигня». Ответ: «Возможно, со стороны так кажется. Давай просто попробуем как игру».</li>
         </ul>
         <p>✅ Раздаётся памятка «Стратегии работы с сопротивлением».</p>`
      ],
      m3: [
        `<h2>🤲 Эмпатия и потребности – занятия 3–4</h2>
         <h3>«Точка зрения»</h3>
         <p>Анализ конфликта (например, в транспорте) с позиции каждого участника: жертвы, агрессора, наблюдателя.</p>
         <p><strong>Вопросы:</strong> «Что он чувствует? Чего хочет? Почему поступил именно так?»</p>
         <div class="highlight-box">Цель – снизить враждебность, показать, что у каждого есть мотивы.</div>`,
         
        `<h2>📸 «Интервью с незнакомцем»</h2>
         <p>Фото человека из стигматизированной группы (женщина в хиджабе, человек с татуировками).</p>
         <p>Подросток – «журналист», задаёт 5–7 вопросов. Психолог отвечает от лица персонажа, разрушая стереотипы.</p>
         <p><strong>Пример ответа:</strong> «Я ношу хиджаб по своему выбору, для меня это символ веры и скромности».</p>`,
         
        `<h2>🏔️ «Моя пирамида» (Маслоу) – осознание потребностей</h2>
         <p>Подросток оценивает по 10‑балльной шкале удовлетворённость 5 уровней: физиология, безопасность, принадлежность, уважение, самореализация.</p>
         <p><strong>Обсуждение:</strong> какие потребности «голодают»? Как радикальные группы их эксплуатируют?</p>
         <p>🔹 <strong>Поиск здоровых альтернатив:</strong> спорт, волонтёрство, кружки, помощь другим.</p>`,
         
        `<h2>🛠️ Отработка в парах</h2>
         <p>Каждый участник пробует провести одно из упражнений с коллегой в роли «подростка».</p>
         <p>После – обсуждение: что было трудно, как удержаться от оценок.</p>`,
         
        `<h2>📌 Памятка: эмпатия и потребности</h2>
         <ul><li>Не морализировать – исследовать чувства.</li><li>Если подросток отрицает потребности, спросить о желаниях («Что бы ты изменил волшебной палочкой?»).</li></ul>`
      ],
      m4: [ ... ], // аналогично расширены, но для экономии места оставлены прежними, можно доработать при необходимости
      m5: [ ... ],
      m6: [ ... ]
    };

    // Для m4, m5, m6 можно вставить заглушки или тоже расширить, но сейчас фокус на m2.
    // Заполним m4, m5, m6 краткими, но содержательными слайдами.
    slidesData.m4 = [
        `<h2>⚠️ Манипуляции и цена насилия – занятия 5–6</h2><h3>«Анатомия манипуляции»</h3><p>Приёмы: эмоциональное давление, ч/б, ярлыки, образ врага, подмена понятий.</p><p>Анализ постов: «Они отнимают наши рабочие места!»</p>`,
        `<h2>🛑 «Стоп-мыслитель»</h2><p>4 вопроса: Что чувствую? На что давят? Какие факты? Кому выгодно?</p><div class="highlight-box">💡 «Если ты не с нами – предатель» → пауза, анализ.</div>`,
        `<h2>🎭 Ролевая игра «Вербовщик и мишень»</h2><p>Психолог — вербовщик, подросток учится противостоять (задавать вопросы, не вестись на лесть).</p>`,
        `<h2>💔 «Круги последствий»</h2><p>Центр: акт насилия. Круги: Жертва, Насильник, Общество. Подросток заполняет последствия.</p>`,
        `<h2>📋 Памятка: манипуляции и насилие</h2><ul><li>Не спорить о содержании, анализировать форму.</li><li>Апеллировать к личным потерям.</li></ul>`
    ];
    slidesData.m5 = [
        `<h2>🌟 Идентичность и будущее – занятия 7–9</h2><h3>«Карта ресурсов»</h3><p>В центре потребности, вокруг сферы (семья, друзья, хобби). Стрелками – что даёт каждая сфера.</p>`,
        `<h2>⚖️ «Моральные дилеммы»</h2><p>Ситуация: друг просит соврать родителям. Варианты, последствия, ответственный выбор.</p>`,
        `<h2>🗺️ «Ресурсная карта» и ритуал</h2><p>Конкретные имена, места, телефоны доверия. Символическое прощание: свеча, сертификат.</p>`,
        `<h2>📦 «Контракт с собой»</h2><p>Личные обязательства: как поступать при провокациях, к кому обратиться.</p>`,
        `<h2>✅ Завершение программы</h2><p>Интеграция, профилактика рецидивов.</p>`
    ];
    slidesData.m6 = [
        `<h2>🎓 Итоговая аттестация (1 час)</h2><p>Демонстрация фрагмента упражнения (5 мин) + самоанализ (2 мин).</p>`,
        `<h2>📊 Критерии оценки</h2><ul><li>Точность инструкции</li><li>Гибкость, безоценочность</li><li>Рефлексия</li></ul>`,
        `<h2>🏅 Вручение сертификатов</h2><p>Поздравление, напутствие.</p>`,
        `<h2>📚 Рекомендации</h2><p>Использовать полный комплект материалов.</p>`,
        `<h2>✨ Спасибо за работу!</h2><p><strong>Детский телефон доверия: 8-800-2000-122</strong></p>`
    ];

    // DOM элементы
    const tabContainer = document.getElementById('tabContainer');
    const lessonTitle = document.getElementById('lessonTitle');
    const lessonMeta = document.getElementById('lessonMeta');
    const slideContent = document.getElementById('slideContent');
    const pageIndicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevSlideBtn');
    const nextBtn = document.getElementById('nextSlideBtn');

    let currentModuleId = 'm1';
    let currentSlide = 0;

    function renderTabs() {
      tabContainer.innerHTML = '';
      modules.forEach(mod => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (mod.id === currentModuleId ? ' active' : '');
        btn.textContent = mod.short;
        btn.addEventListener('click', () => { setActiveModule(mod.id); });
        tabContainer.appendChild(btn);
      });
    }

    function setActiveModule(moduleId) {
      currentModuleId = moduleId;
      currentSlide = 0;
      document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
        btn.classList.toggle('active', modules[idx].id === moduleId);
      });
      const mod = modules.find(m => m.id === moduleId);
      lessonTitle.textContent = mod.name;
      lessonMeta.textContent = mod.meta;
      updateSlide();
    }

    function updateSlide() {
      const slides = slidesData[currentModuleId] || [];
      if (!slides.length) {
        slideContent.innerHTML = '<p>⚙️ Материалы готовятся</p>';
        pageIndicator.textContent = `Слайд 0 / 0`;
        prevBtn.disabled = nextBtn.disabled = true;
        return;
      }
      slideContent.innerHTML = slides[currentSlide];
      pageIndicator.textContent = `Слайд ${currentSlide+1} / ${slides.length}`;
      prevBtn.disabled = (currentSlide === 0);
      nextBtn.disabled = (currentSlide === slides.length - 1);
    }

    prevBtn.addEventListener('click', () => { if (currentSlide > 0) { currentSlide--; updateSlide(); } });
    nextBtn.addEventListener('click', () => { if (currentSlide < slidesData[currentModuleId].length - 1) { currentSlide++; updateSlide(); } });

    let touchStart = 0;
    slideContent.addEventListener('touchstart', e => { touchStart = e.changedTouches[0].screenX; }, {passive: true});
    slideContent.addEventListener('touchend', e => {
      if (!touchStart) return;
      const diff = e.changedTouches[0].screenX - touchStart;
      if (Math.abs(diff) > 50) {
        const slides = slidesData[currentModuleId];
        if (diff < 0 && currentSlide < slides.length-1) { currentSlide++; updateSlide(); }
        else if (diff > 0 && currentSlide > 0) { currentSlide--; updateSlide(); }
      }
      touchStart = 0;
    });

    renderTabs();
    setActiveModule('m1');
  })();
</script>
</body>
</html>
